encoder:
  type: "treadmill"
  port: "COM5"
  baudrate: 19200
  cpr: 2400
  diameter_mm: 80
  sample_interval_ms: 20
  development_mode: False
  output:
    suffix: "treadmill"
    file_type: "csv" 
    bids_type: "beh"

