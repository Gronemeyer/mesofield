cameras:
  - id: "ThorCam"
    primary: True
    name: "pupil"
    backend: "micromanager"
    micromanager_path: "C:/Program Files/Micro-Manager-2.0"
    configuration_path: "C:/Program Files/Micro-Manager-2.0/PupilCam.cfg"
    auto_contrast:
    properties:
      ThorCam:
        Exposure: 20
        fps: 20 #20 if fulll ROI # IMPORTANT: This is validated externally and is a value used merely to calculate experiment duration and frames to capture
        #ROI: [440, 305, 509, 509]
        viewer_type: "static"
    output:
      suffix: "pupil"
      file_type: "mp4" 
      bids_type: "func"
    #widgets:
      #- camera_snap

