# Widefield + pupil cameras + treadmill + MousePortal corridor (gain trials).
#
# mesofield is the orchestrator: it owns the treadmill serial port, logs every
# sample to the central dataqueue (sync), and launches MousePortal as a
# subprocess stimulus device. Live treadmill velocity is forwarded to
# MousePortal over a localhost UDP socket; MousePortal runs the gain-trial
# block defined below.
#
# DEV / mock setup — runs end to end with no real hardware. Swap notes inline.
memory_buffer_size: 4000

encoder:
  type: "treadmill"
  port: "COM8"
  baudrate: 192000
  output:
    suffix: "treadmill"
    file_type: "csv"
    bids_type: "beh"


cameras:
  - id: "Dhyana"
    name: "mesoscope"
    backend: "micromanager"
    primary: true
    micromanager_path: "C:/Program Files/Micro-Manager-2.0-260528"
    configuration_path: "C:/Program Files/Micro-Manager-2.0/mm-sipefield.cfg"
    auto_contrast: True
    properties:
      Dhyana:
        Exposure: 20.0
        Output Trigger Port: 2
        Output Trigger Kind: "Global Exposure"
        Output Trigger Edge Mode: "Rising"
        Gain: "High Dynamic"
        fps: 49.9 # IMPORTANT: This is validated externally and is a value used merely to calculate experiment duration and frames to capture
        viewer_type: "static"
      Arduino-Shutter:
        OnOff: "1"
      Arduino-Switch:
        Sequence: "On"
      Core:
        Shutter: "Arduino-Shutter"
      viewer_type: "static"
    output:
      suffix: "meso"
      file_type: "ome.tiff"
      bids_type: "func"
    widgets:
      - led_control

  - id: "ThorCam"
    name: "pupil"
    backend: "micromanager"
    micromanager_path: "C:/Program Files/Micro-Manager-2.0-260528"
    configuration_path: "C:/Program Files/Micro-Manager-2.0/ThorCam.cfg"
    properties:
      ThorCam:
        Exposure: 20.0 # this is equivalen to setting the camera to 20 fps
        fps: 50 # IMPORTANT: This is validated externally and is a value used merely to calculate experiment duration and frames to capture
        ROI: [440, 305, 509, 509]
        viewer_type: "static"
    output:
      suffix: "pupil"
      file_type: "mp4" # adding the `.` as in ".mp4" will cause an error
      bids_type: "func"



# --- MousePortal corridor stimulus ----------------------------------------
# Subprocess plumbing only. The corridor + gain-trial DESIGN lives in the
# ExperimentConfig (experiment.json -> Configuration.mouseportal), so it is part
# of the experiment record, not the rig file.
mouseportal:
  type: mouseportal
  app_dir: C:/Users/SIPE_LAB/Desktop/dev/MousePortal
  # Interpreter used to launch MousePortal. Pin this to a Python that has
  # MousePortal + panda3d installed; otherwise mesofield falls back to its own
  # interpreter, which may be a conda env without mouseportal (the subprocess
  # would then die with "No module named mouseportal"). Omit to use mesofield's
  # interpreter when MousePortal is installed in the same environment.
  python_exe: C:/Users/SIPE_LAB/.conda/envs/mouse-portal/python.exe
  udp_port: 8765
  treadmill_id: treadmill
  ready_timeout: 30.0
  # mesofield runs this many seconds past the last MousePortal trial so the
  # cameras finish their preallocated frames cleanly.
  tail_seconds: 5.0
