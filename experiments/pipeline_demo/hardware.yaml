# Headless demo rig for the mesokit-schema pipeline test.
#
# No cameras and no real serial hardware so this can run anywhere.
# A single MockEncoderDevice plays the role of "primary" device:
# its `signals.finished` would normally trigger procedure cleanup,
# but since the mock encoder runs forever, the procedure uses a
# wall-clock `duration` cap (see experiment.json) to call cleanup
# instead.
memory_buffer_size: 1000

wheel:
  type: mock_wheel        # registered by procedure.py at import time
  primary: true
  sample_interval_ms: 50
  cpr: 2400
  diameter_mm: 80
  output:
    suffix: wheel
    file_type: csv
    bids_type: beh
