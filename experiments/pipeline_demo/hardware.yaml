# Headless demo rig for the mesokit-schema pipeline test.
#
# Two synthetic devices, no real serial or pymmcore hardware:
#   - mock_wheel: MockEncoderDevice producing CSV samples
#   - mock_camera: BaseDataProducer subclass writing a real OME-TIFF
#                  stack + a _frame_metadata.json sidecar
#
# The camera is primary; the procedure also arms a wall-clock
# `duration` cap (see experiment.json) that calls cleanup.
memory_buffer_size: 1000


camera:
  type: mock_camera       # registered by procedure.py at import time
  primary: true
  width: 32
  height: 32
  frame_interval_ms: 100
  output:
    suffix: meso
    file_type: ome.tiff
    bids_type: func

wheel:
  type: mock_wheel        # registered by procedure.py at import time
  sample_interval_ms: 100
  cpr: 2400
  diameter_mm: 80
  output:
    suffix: wheel
    file_type: csv
    bids_type: beh
